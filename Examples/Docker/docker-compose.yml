services:
  xponents:
    container_name: xponents
    image: mubaldino/opensextant:xponents-3.8
    # Shrink docker image size by mapping in xponents-solr at runtime; 
    # Patch docker image by mapping in updated java lib/.
    #volumes:
    #    - ./xponents-solr:/home/opensextant/Xponents/xponents-solr
    #    - ./lib:/home/opensextant/Xponents/lib
    environment:
        - JAVA_XMS=4g
        - JAVA_XMX=4g
    ports:
        - "8787:8787"

  gazetteer:
    container_name: gazetteer
    image: mubaldino/opensextant:xponents-3.8
    entrypoint: ./xponents-solr/solr7-dist/bin/solr start -p 7000 -s ./xponents-solr/solr7 -m 3g -q  -foreground  -force
    ports:
        - "7000:7000"

networks:
  default:
      

